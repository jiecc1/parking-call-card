<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="format-detection" content="telephone=yes">
  <title>临时停车</title>
  <style>
    :root {
      --blue: #0058bd;
      --navy: #07111f;
      --line: #d8e4f2;
      --page: #f4f7fb;
      --amber: #ffb91e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--page);
      color: var(--navy);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .card {
      width: min(92vw, 420px);
      min-height: min(94vh, 640px);
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 6px solid var(--blue);
      border-radius: 24px;
      background: #fff;
      box-shadow: 0 18px 40px rgba(7, 17, 31, 0.08);
    }

    .inner {
      width: 100%;
      flex: 1;
      padding: 22px 18px 26px;
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 18px;
    }

    .parking-mark {
      position: relative;
      width: 128px;
      height: 128px;
      margin-top: 4px;
      display: grid;
      place-items: center;
    }

    .parking-mark::before {
      content: "";
      position: absolute;
      inset: 0;
      border-top: 8px solid var(--amber);
      border-radius: 999px 999px 0 0;
      transform: scaleX(1.18);
    }

    .parking-circle {
      width: 92px;
      height: 92px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--blue);
      color: #fff;
      font-size: 62px;
      line-height: 1;
      font-weight: 500;
    }

    h1 {
      margin: 30px 0 18px;
      font-size: clamp(54px, 15vw, 70px);
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: 0;
    }

    .divider {
      position: relative;
      width: 82%;
      height: 10px;
      margin-bottom: 48px;
      border-radius: 999px;
      background: var(--blue);
    }

    .divider::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 100%;
      width: 72px;
      height: 28px;
      transform: translateX(-50%);
      clip-path: polygon(0 0, 100% 0, 72% 100%, 28% 100%);
      background: var(--blue);
    }

    .call-panel {
      width: 100%;
      margin-top: auto;
      padding: 8px 0 4px;
      text-align: center;
    }

    .tip {
      margin: 0 0 16px;
      color: #3d4756;
      font-size: 17px;
      font-weight: 600;
      line-height: 1.5;
    }

    .phone {
      margin: 0 0 24px;
      font-size: 34px;
      line-height: 1.1;
      font-weight: 900;
      letter-spacing: 0;
    }

    .call-button {
      display: block;
      width: min(100%, 320px);
      margin: 0 auto;
      padding: 18px 20px;
      border-radius: 10px;
      background: var(--blue);
      color: #fff;
      text-decoration: none;
      font-size: 23px;
      line-height: 1.1;
      font-weight: 900;
      box-shadow: 0 8px 16px rgba(0, 88, 189, 0.18);
      -webkit-tap-highlight-color: transparent;
    }

    .call-button:active {
      transform: translateY(1px);
      background: #004ba3;
    }

    @media (max-width: 360px) {
      .card {
        padding: 18px 14px;
        border-width: 5px;
      }

      .inner {
        padding: 18px 12px 22px;
      }

      .parking-mark {
        width: 112px;
        height: 112px;
      }

      .parking-circle {
        width: 80px;
        height: 80px;
        font-size: 54px;
      }

      .tip {
        font-size: 15px;
      }

      .phone {
        font-size: 30px;
      }

      .call-button {
        font-size: 21px;
      }
    }
  </style>
</head>
<body>
  <main class="card" aria-label="临时停车联系页面">
    <section class="inner">
      <div class="parking-mark" aria-hidden="true">
        <div class="parking-circle">P</div>
      </div>

      <h1>临时停车</h1>
      <div class="divider" aria-hidden="true"></div>

      <section class="call-panel">
        <p class="tip">如需挪车，请点击下方按钮联系车主</p>
        <p class="phone">15267108376</p>
        <a
          class="call-button"
          href="tel:15267108376"
          aria-label="拨打车主电话 15267108376"
        >拨打车主电话</a>
      </section>
    </section>
  </main>
</body>
</html>
